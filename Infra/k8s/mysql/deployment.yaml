apiVersion: apps/v1
kind: Deployment
metadata:
  name: mysql
  namespace: colegio-ohiggins
  labels:
    app: mysql
    tier: data
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
        tier: data
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: colegio-ohiggins-secret
                  key: MYSQL_ROOT_PASSWORD
            - name: MYSQL_DATABASE
              value: db_academic
            - name: MYSQL_USER
              value: app_colegio
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: colegio-ohiggins-secret
                  key: MYSQL_PASSWORD
          livenessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "--silent"]
            initialDelaySeconds: 60
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            exec:
              command: ["mysqladmin", "ping", "-h", "localhost", "--silent"]
            initialDelaySeconds: 30
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          volumeMounts:
            - name: mysql-data
              mountPath: /var/lib/mysql
      volumes:
        - name: mysql-data
          emptyDir: {}
