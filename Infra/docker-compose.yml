# =============================================================================
# Docker Compose - Colegio Ohiggins Platform
# Ubicación: /Infra/docker-compose.yml
# Descripción: Orquestación de 6 servicios (5 aplicaciones + MySQL)
# Seguridad: Redes internas, healthchecks, usuarios no-root, least privilege
# =============================================================================

services:
  # ===========================================================================
  # Servidor de Descubrimiento (Eureka Server)
  # ===========================================================================
  discovery-server:
    build:
      context: ../
      dockerfile: Infra/docker/discovery.Dockerfile # Asegurar que exista o ajustar a su ruta real
    container_name: colegio-discovery-server
    hostname: discovery-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    environment:
      SERVER_PORT: 8761
      EUREKA_INSTANCE_HOSTNAME: discovery-server
    networks:
      - colegio-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/"] # Versión limpia si no hay actuator
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ===========================================================================
  # MySQL - Base de Datos (Segura y Persistente)
  # ===========================================================================
  mysql:
    image: mysql:8.0
    container_name: colegio-mysql
    hostname: mysql
    restart: unless-stopped

    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME_STUDENTS:-db_academic}
      MYSQL_USER: ${DB_USERNAME:-app_colegio}
      MYSQL_PASSWORD: ${DB_PASSWORD}

    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro

    ports:
      - "${DB_PORT:-3306}:3306"

    networks:
      - colegio-network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 40s

    security_opt:
      - no-new-privileges:true

    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M

  # ===========================================================================
  # Microservicio: ms-students
  # ===========================================================================
  ms-students:
    build:
      context: ../
      dockerfile: Infra/docker/students.Dockerfile
    container_name: colegio-ms-students
    hostname: ms-students
    restart: unless-stopped

    ports:
      - "${MS_STUDENTS_PORT:-8081}:${MS_STUDENTS_PORT:-8081}"

    environment:
      SERVER_PORT: ${MS_STUDENTS_PORT:-8081}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME_STUDENTS:-db_academic}
      DB_USERNAME: ${DB_USERNAME:-app_colegio}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}

      # CAMBIO DE INGENIERÍA: Apuntar al DNS de la red interna de Docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

      SPRING_CLOUD_COMPATIBILITY_VERIFIER_ENABLED: "false"

    networks:
      - colegio-network

    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started # Evita fallos de red en el arranque inicial

    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:${MS_STUDENTS_PORT:-8081}/actuator/health" ]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ===========================================================================
  # Microservicio: ms-attendance
  # ===========================================================================
  ms-attendance:
    build:
      context: ../
      dockerfile: Infra/docker/attendance.Dockerfile
    container_name: colegio-ms-attendance
    hostname: ms-attendance
    restart: on-failure

    environment:
      SERVER_PORT: ${MS_ATTENDANCE_PORT:-8082}
      DB_HOST: ${DB_HOST:-mysql}
      DB_PORT: ${DB_PORT:-3306}
      DB_NAME: ${DB_NAME_ATTENDANCE:-db_record}
      DB_USERNAME: ${DB_USERNAME:-app_colegio}
      DB_PASSWORD: ${DB_PASSWORD}
      SPRING_JPA_HIBERNATE_DDL_AUTO: ${SPRING_JPA_DDL_AUTO:-update}
      SPRING_JPA_SHOW_SQL: ${SPRING_JPA_SHOW_SQL:-false}
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}

      # CAMBIO DE INGENIERÍA: Apuntar al DNS de la red interna de Docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

    networks:
      - colegio-network

    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MS_ATTENDANCE_PORT:-8082}/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 90s

  # ===========================================================================
  # Gateway BFF (Backend for Frontend)
  # ===========================================================================
  backend-bff:
    build:
      context: ../
      dockerfile: Infra/docker/bff.Dockerfile
    container_name: colegio-bff
    hostname: backend-bff
    restart: on-failure

    environment:
      SERVER_PORT: ${BFF_PORT:-8080}
      MS_STUDENTS_URL: ${MS_STUDENTS_URL:-http://ms-students:8081}
      MS_ATTENDANCE_URL: ${MS_ATTENDANCE_URL:-http://ms-attendance:8082}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:5173,http://frontend:8080}
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}

      # CAMBIO DE INGENIERÍA: Apuntar al DNS de la red interna de Docker
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://discovery-server:8761/eureka/
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"

    ports:
      - "${BFF_PORT:-8080}:${BFF_PORT:-8080}"

    networks:
      - colegio-network

    depends_on:
      mysql:
        condition: service_healthy
      discovery-server:
        condition: service_started
      ms-students:
        condition: service_started
      ms-attendance:
        condition: service_started

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${BFF_PORT:-8080}/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 6
      start_period: 120s

  # ===========================================================================
  # Frontend (React + Vite)
  # ===========================================================================
  frontend:
    build:
      context: ../
      dockerfile: Infra/docker/frontend.Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://backend-bff:8080}
    container_name: colegio-frontend
    hostname: frontend
    restart: unless-stopped

    environment:
      VITE_API_URL: ${VITE_API_URL:-http://backend-bff:8080}

    ports:
      - "${FRONTEND_PORT:-5173}:8080"

    networks:
      - colegio-network

    depends_on:
      backend-bff:
        condition: service_started

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

# -----------------------------------------------------------------------------
# VOLÚMENES
# -----------------------------------------------------------------------------
volumes:
  mysql_data:
    driver: local

# -----------------------------------------------------------------------------
# REDES
# -----------------------------------------------------------------------------
networks:
  colegio-network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16
    internal: false