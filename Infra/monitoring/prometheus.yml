global:
  scrape_interval:     5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: 'colegio-platform-metrics'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets:
          - 'api-gateway:8080'
          - 'backend-bff:8083'
          - 'ms-students:8081'
          - 'ms-attendance:8082'
