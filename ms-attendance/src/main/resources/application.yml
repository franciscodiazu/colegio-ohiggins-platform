spring:
  application:
    name: ms-attendance

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_record}?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:app_colegio}
    password: ${DB_PASSWORD:Ohiggins_Secur3_2026!}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}

server:
  port: ${MS_ATTENDANCE_PORT:8082}

services:
  students:
    url: ${STUDENTS_SERVICE_URL:http://MS-STUDENTS}

# Logging para CloudWatch
logging:
  level:
    com.backend.ms_attendance: DEBUG
    org.springframework.web: INFO
    org.springframework.boot: INFO
    org.springframework.web.client: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    instances:
      studentsValidation:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - com.backend.ms_attendance.exception.EntidadNoEncontradaException