spring:
  application:
    name: ms-attendance

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_record}?createDatabaseIfNotExist=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://discovery-server:8761/eureka/}

server:
  port: ${MS_ATTENDANCE_PORT:8082}

# ============================================================
# CONFIGURACIÓN DE SERVICIOS - ¡CAMBIA ESTO!
# ============================================================
services:
  students:
    # PARA LOCAL: usa localhost
    url: ${STUDENTS_SERVICE_URL:http://localhost:8081}
    # PARA DOCKER: usa ms-students
    # url: ${STUDENTS_SERVICE_URL:http://ms-students:8081}

# Logging para CloudWatch
logging:
  level:
    com.backend.ms_attendance: DEBUG
    org.springframework.web: INFO
    org.springframework.boot: INFO
    # Log específico para ver las llamadas HTTP
    org.springframework.web.client: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    instances:
      studentsValidation:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 10
        minimumNumberOfCalls: 5
        failureRateThreshold: 50
        waitDurationInOpenState: 20s
        permittedNumberOfCallsInHalfOpenState: 3
        automaticTransitionFromOpenToHalfOpenEnabled: true
        ignoreExceptions:
          - com.backend.ms_attendance.exception.EntidadNoEncontradaException