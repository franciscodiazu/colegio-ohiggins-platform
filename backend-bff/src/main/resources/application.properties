# Nombre de la aplicación
spring.application.name=backend-bff

# Puerto del Gateway (Punto de entrada único)
server.port=8080

# Configuración de rutas del API Gateway
# Enrutamiento hacia ms-attendance (única ruta gateway restante)
spring.cloud.gateway.mvc.routes[0].id=attendance-route
spring.cloud.gateway.mvc.routes[0].uri=${MS_ATTENDANCE_URL:http://localhost:8082}
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/asistencia/**
spring.cloud.gateway.mvc.routes[0].filters[0]=RewritePath=/api/asistencia/(?<segment>.*),/api/v1/asistencia/$\{segment}

# Servicios internos
services.students.url=${MS_STUDENTS_URL:http://localhost:8081}

# Configuración CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
