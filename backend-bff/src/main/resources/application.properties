# Nombre de la aplicación
spring.application.name=backend-bff
eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://discovery-server:8761/eureka/}

# Puerto del servidor
server.port=8083

# Servicios internos (usados por PlatformHealthIndicator)
services.students.url=${MS_STUDENTS_URL:http://localhost:8081}
services.attendance.url=${MS_ATTENDANCE_URL:http://localhost:8082}

# Configuración CORS
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

# Actuator / Prometheus
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}