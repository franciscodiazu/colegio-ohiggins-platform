name: CI - Colegio O'Higgins

on:
  push:
    branches: [ main, master, develop, doc/ev3-deliverables ]
  pull_request:
    branches: [ main, master, develop, doc/ev3-deliverables ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Build frontend (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Cache desactivado temporalmente para evitar bloqueos por reparse points / corrupciones
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Build production bundle
        working-directory: frontend
        run: npm run build
      - name: Run unit tests
        working-directory: frontend
        run: npm run test

  api-gateway:
    name: Test api-gateway (Maven)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'
      - name: Test with Maven
        working-directory: api-gateway
        run: mvn clean test -B

