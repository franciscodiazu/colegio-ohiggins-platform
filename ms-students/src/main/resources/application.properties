# Nombre de la aplicación
spring.application.name=ms-students

# Puerto del microservicio
server.port=${MS_STUDENTS_PORT:8081}

# Configuración de Base de Datos MySQL (db_academic)
# Variables de entorno para soporte Docker/Local
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:db_academic}?createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuración de JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Le enseñamos al microservicio que el discovery-server está dentro de Docker
eureka.client.serviceUrl.defaultZone=${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://localhost:8761/eureka/}
eureka.instance.preferIpAddress=${EUREKA_INSTANCE_PREFER_IP_ADDRESS:true}

# Habilitamos explícitamente el endpoint de información
management.endpoints.web.exposure.include=health,info

# Datos personalizados que va a retornar el endpoint /actuator/info
info.app.name=Microservicio de Estudiantes - Colegio O'Higgins
info.app.description=Módulo encargado de la gestión académica y matrícula de alumnos
info.app.version=1.0.0
info.app.java-version=21