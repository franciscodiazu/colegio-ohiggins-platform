spring.application.name=api-gateway
server.port=8080
eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# ─── Gateway Routes ───────────────────────────────────────────────────────
spring.cloud.gateway.mvc.routes[0].id=students-route
spring.cloud.gateway.mvc.routes[0].uri=${MS_STUDENTS_URL:http://localhost:8081}
spring.cloud.gateway.mvc.routes[0].predicates[0]=Path=/api/students/**
spring.cloud.gateway.mvc.routes[0].filters[0]=RewritePath=/api/students/(?<segment>.*),/api/v1/estudiantes/${segment}

spring.cloud.gateway.mvc.routes[1].id=attendance-route
spring.cloud.gateway.mvc.routes[1].uri=${MS_ATTENDANCE_URL:http://localhost:8082}
spring.cloud.gateway.mvc.routes[1].predicates[0]=Path=/api/asistencia/**
spring.cloud.gateway.mvc.routes[1].filters[0]=RewritePath=/api/asistencia/(?<segment>.*),/api/v1/asistencia/${segment}

# ─── CORS ──────────────────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

# ─── Auth Database ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME_AUTH:colegio_auth_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:app_colegio}
spring.datasource.password=${DB_PASSWORD:Ohiggins_Secur3_2026!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.show-sql=false

# ─── Actuator / Prometheus ──────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

# ─── JWT ────────────────────────────────────────────────────────────────────
