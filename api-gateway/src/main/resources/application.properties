spring.application.name=api-gateway
server.port=8080
eureka.client.serviceUrl.defaultZone=${EUREKA_URL:http://localhost:8761/eureka/}

# ─── Gateway Routes ───────────────────────────────────────────────────────
# Students root (exact /api/students without trailing slash, used by frontend)
spring.cloud.gateway.server.webmvc.routes[0].id=students-root-route
spring.cloud.gateway.server.webmvc.routes[0].uri=${MS_STUDENTS_URL:lb://MS-STUDENTS}
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/students
spring.cloud.gateway.server.webmvc.routes[0].filters[0]=RewritePath=/api/students,/api/v1/estudiantes

# Students subpaths (/api/students/**)
spring.cloud.gateway.server.webmvc.routes[1].id=students-sub-route
spring.cloud.gateway.server.webmvc.routes[1].uri=${MS_STUDENTS_URL:lb://MS-STUDENTS}
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/students/**
spring.cloud.gateway.server.webmvc.routes[1].filters[0]=RewritePath=/api/students/(?<segment>.*),/api/v1/estudiantes/${segment}

# Attendance root (exact /api/asistencia without trailing slash, used by frontend)
spring.cloud.gateway.server.webmvc.routes[2].id=attendance-root-route
spring.cloud.gateway.server.webmvc.routes[2].uri=${MS_ATTENDANCE_URL:lb://MS-ATTENDANCE}
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/asistencia
spring.cloud.gateway.server.webmvc.routes[2].filters[0]=RewritePath=/api/asistencia,/api/v1/asistencia

# Attendance subpaths (/api/asistencia/**)
spring.cloud.gateway.server.webmvc.routes[3].id=attendance-sub-route
spring.cloud.gateway.server.webmvc.routes[3].uri=${MS_ATTENDANCE_URL:lb://MS-ATTENDANCE}
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/asistencia/**
spring.cloud.gateway.server.webmvc.routes[3].filters[0]=RewritePath=/api/asistencia/(?<segment>.*),/api/v1/asistencia/${segment}

# Classes root (exact /api/clases without trailing slash, used by frontend)
spring.cloud.gateway.server.webmvc.routes[4].id=classes-root-route
spring.cloud.gateway.server.webmvc.routes[4].uri=${MS_ATTENDANCE_URL:lb://MS-ATTENDANCE}
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/clases
spring.cloud.gateway.server.webmvc.routes[4].filters[0]=RewritePath=/api/clases,/api/v1/clases

# Classes subpaths (/api/clases/**)
spring.cloud.gateway.server.webmvc.routes[5].id=classes-sub-route
spring.cloud.gateway.server.webmvc.routes[5].uri=${MS_ATTENDANCE_URL:lb://MS-ATTENDANCE}
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/api/clases/**
spring.cloud.gateway.server.webmvc.routes[5].filters[0]=RewritePath=/api/clases/(?<segment>.*),/api/v1/clases/${segment}

# Evaluaciones root (exact /api/evaluaciones)
spring.cloud.gateway.server.webmvc.routes[6].id=evaluaciones-root-route
spring.cloud.gateway.server.webmvc.routes[6].uri=${MS_ATTENDANCE_URL:lb://MS-ATTENDANCE}
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/api/evaluaciones
spring.cloud.gateway.server.webmvc.routes[6].filters[0]=RewritePath=/api/evaluaciones,/api/v1/evaluaciones

# Evaluaciones subpaths (/api/evaluaciones/**)
spring.cloud.gateway.server.webmvc.routes[7].id=evaluaciones-sub-route
spring.cloud.gateway.server.webmvc.routes[7].uri=${MS_ATTENDANCE_URL:lb://MS-ATTENDANCE}
spring.cloud.gateway.server.webmvc.routes[7].predicates[0]=Path=/api/evaluaciones/**
spring.cloud.gateway.server.webmvc.routes[7].filters[0]=RewritePath=/api/evaluaciones/(?<segment>.*),/api/v1/evaluaciones/${segment}

# ─── CORS ──────────────────────────────────────────────────────────────────
cors.allowed.origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

# ─── Auth Database ─────────────────────────────────────────────────────────
spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME_AUTH:colegio_auth_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=${DB_USERNAME:app_colegio}
spring.datasource.password=${DB_PASSWORD:Ohiggins_Secur3_2026!}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
# Hibernate auto-detects dialect from JDBC URL
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ─── Actuator / Prometheus ──────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}

