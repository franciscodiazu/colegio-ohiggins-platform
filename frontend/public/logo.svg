<svg xmlns="http://www.w3.org/2000/svg" width="320" height="80" viewBox="0 0 320 80" role="img">
  <title>Colegio Bernardo O'Higgins</title>
  <defs>
    <style>
      .lb { fill: #153e87; }
      .lw { fill: #ffffff; }
      .ll { fill: #d6e4ff; }
    </style>
  </defs>
  <!-- Escudo -->
  <g transform="translate(8, 6)">
    <path d="M0,0 L44,0 L44,50 Q44,68 22,76 Q0,68 0,50 Z" class="lb"/>
    <text x="22" y="22" text-anchor="middle" font-family="'Segoe UI',sans-serif" font-size="16" font-weight="700" fill="#ffffff">B</text>
    <rect x="8" y="26" width="28" height="1.5" fill="#ffffff" rx="1"/>
    <rect x="10" y="34" width="24" height="1.5" fill="#d6e4ff" rx="1"/>
    <rect x="13" y="41" width="18" height="1.5" fill="#d6e4ff" rx="1"/>
    <rect x="16" y="48" width="12" height="1.5" fill="#d6e4ff" rx="1"/>
  </g>
  <!-- Línea divisora -->
  <line x1="64" y1="12" x2="64" y2="68" stroke="#d6e4ff" stroke-width="1"/>
  <!-- Textos -->
  <text x="76" y="34" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="600" fill="#153e87">Colegio Bernardo</text>
  <text x="76" y="56" font-family="'Segoe UI',sans-serif" font-size="18" font-weight="600" fill="#153e87">O'Higgins</text>
  <text x="76" y="70" font-family="'Segoe UI',sans-serif" font-size="9" font-weight="400" fill="#5f7dba" letter-spacing="2">ESTABLECIMIENTO EDUCACIONAL</text>
